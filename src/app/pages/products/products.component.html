<div class="title-container">
<p>Our products</p>
</div>

<div class="product-grid">
  <div class="card-wrapper" *ngFor="let product of products">

    <div class="card">
            <img [src]="product.image" [alt]="product.title" />
    <h3>{{ product.title }}</h3>
    <p>${{ product.price }}</p>
    </div>

    <button class="add-to-cart-btn"
    (click)="addToCart(product)"
    >Add to Cart</button>
  </div>
</div>
