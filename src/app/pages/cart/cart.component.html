<div class="checkout-wrapper">
  <p>Checkout</p>
</div>

<div class="flex flex-row">


<div class=" border-black border-1 m-20 p-3 w-[40%]">
 

  <div 
*ngFor="let item of items"
class="m-3"
>
<div class="flex flex-row justify-between items-center w-full">
    <img 
      class="w-30"
      [src]="item.image" [alt]="item.title" />


<div class="flex flex-row gap-10 justify-between items-end">
     <p>{{ item.title}}</p>
    <p>{{ item.price}}</p>
</div>
</div>

  
    
</div>


</div>

<div class="total-box flex justify-center items-center">
  <div class="total-price-box">
       <h2>Total: ${{ totalPrice }}</h2>
  </div>
 
</div>
</div>
